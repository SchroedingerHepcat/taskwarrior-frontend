name: Flutter

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Test Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            xvfb
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Widget Tests
        run: flutter test
      - name: Build Rust Test Backend
        working-directory: rust
        run: cargo build -p server
      - name: Integration Tests
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" \
            flutter test -d linux \
            integration_test/app_shell_test.dart
      - name: Linux Shell Parity Tests
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" \
            flutter test -d linux \
            integration_test/shell_parity_test.dart

  web-ui-parity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Firefox And Geckodriver
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl firefox
          geckodriver_version="${GECKODRIVER_VERSION:-v0.36.0}"
          geckodriver_archive="geckodriver-${geckodriver_version}-linux64"
          geckodriver_base="https://github.com/mozilla/geckodriver"
          geckodriver_url="${geckodriver_base}/releases/download"
          geckodriver_url="${geckodriver_url}/${geckodriver_version}"
          geckodriver_url="${geckodriver_url}/${geckodriver_archive}.tar.gz"
          curl -fsSL \
            "$geckodriver_url" \
            -o /tmp/geckodriver.tar.gz
          tar -xzf /tmp/geckodriver.tar.gz -C /tmp
          sudo install -m 0755 /tmp/geckodriver /usr/local/bin/geckodriver
          geckodriver --version
      - name: Get dependencies
        run: flutter pub get
      - name: Build Web Test Backend
        working-directory: rust
        run: cargo build -p server
      - name: Start Rust Test Backend
        run: |
          state_dir="$(mktemp -d)"
          export TASKCHAMPION_STORAGE_PATH="${state_dir}/tasks.sqlite"
          export TASKWARRIOR_FRONTEND_UI_STATE_PATH="${state_dir}/ui.json"
          nohup ../rust/target/debug/server \
            --host 127.0.0.1 \
            --port 38182 \
            > /tmp/taskwarrior-web-smoke.log 2>&1 &
          server_pid="$!"
          echo "$server_pid" > /tmp/taskwarrior-web-smoke.pid
          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:38182/health; then
              exit 0
            fi
            sleep 0.25
          done
          cat /tmp/taskwarrior-web-smoke.log
          exit 1
      - name: Chrome Shell Parity Tests
        run: |
          if ! command -v chromedriver > /dev/null 2>&1; then
            echo "chromedriver is required for Chrome web integration tests"
            exit 1
          fi
          chrome_bin="${CHROME_EXECUTABLE:-}"
          if [ -z "$chrome_bin" ]; then
            driver_major="$(
              chromedriver --version \
                | sed -E 's/.* ([0-9]+)\..*/\1/'
            )"
            for candidate in \
              google-chrome-stable \
              google-chrome \
              chromium \
              chromium-browser
            do
              if command -v "$candidate" > /dev/null 2>&1; then
                candidate_bin="$(command -v "$candidate")"
                browser_major="$(
                  "$candidate_bin" --version \
                    | sed -E 's/.* ([0-9]+)\..*/\1/'
                )"
                if [ "$browser_major" = "$driver_major" ]; then
                  chrome_bin="$candidate_bin"
                  break
                fi
                if [ -z "$chrome_bin" ]; then
                  chrome_bin="$candidate_bin"
                fi
              fi
            done
          fi
          if [ -z "$chrome_bin" ]; then
            echo "No Chrome-compatible browser found"
            exit 1
          fi
          export CHROME_EXECUTABLE="$chrome_bin"
          echo "$chrome_bin" > /tmp/chrome-executable
          chromedriver --port=4444 > /tmp/chromedriver.log 2>&1 &
          driver_pid="$!"
          trap 'kill "$driver_pid"' EXIT
          flutter drive \
            -d web-server \
            --browser-name=chrome \
            --chrome-binary="$chrome_bin" \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/shell_parity_test.dart \
            --no-web-resources-cdn
      - name: Chrome Backend Smoke Test
        run: |
          chrome_bin="$(cat /tmp/chrome-executable)"
          chromedriver --port=4444 > /tmp/chromedriver.log 2>&1 &
          driver_pid="$!"
          trap 'kill "$driver_pid"' EXIT
          flutter drive \
            -d web-server \
            --browser-name=chrome \
            --chrome-binary="$chrome_bin" \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/web_backend_smoke_test.dart \
            --dart-define=BACKEND_URL=http://127.0.0.1:38182 \
            --no-web-resources-cdn
      - name: Firefox Shell Parity Tests
        run: |
          if ! command -v geckodriver > /dev/null 2>&1; then
            echo "geckodriver is required for Firefox web integration tests"
            exit 1
          fi
          geckodriver --port 4444 > /tmp/geckodriver.log 2>&1 &
          driver_pid="$!"
          trap 'kill "$driver_pid"' EXIT
          flutter drive \
            -d web-server \
            --browser-name=firefox \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/shell_parity_test.dart \
            --no-web-resources-cdn
      - name: Firefox Backend Smoke Test
        run: |
          geckodriver --port 4444 > /tmp/geckodriver.log 2>&1 &
          driver_pid="$!"
          trap 'kill "$driver_pid"' EXIT
          flutter drive \
            -d web-server \
            --browser-name=firefox \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/web_backend_smoke_test.dart \
            --dart-define=BACKEND_URL=http://127.0.0.1:38182 \
            --no-web-resources-cdn
      - name: Stop Rust Test Backend
        if: always()
        run: |
          if [ -f /tmp/taskwarrior-web-smoke.pid ]; then
            kill "$(cat /tmp/taskwarrior-web-smoke.pid)" || true
          fi

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Build Web
        run: flutter build web

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux

  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Build Android
        run: flutter build apk --debug

  android-ui-parity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
      - name: Get dependencies
        run: flutter pub get
      - name: Build Android Test Backend
        working-directory: rust
        run: cargo build -p server
      - name: Start Android Rust Test Backend
        run: |
          state_dir="$(mktemp -d)"
          export TASKCHAMPION_STORAGE_PATH="${state_dir}/tasks.sqlite"
          export TASKWARRIOR_FRONTEND_UI_STATE_PATH="${state_dir}/ui.json"
          nohup ../rust/target/debug/server \
            --host 0.0.0.0 \
            --port 38184 \
            > /tmp/taskwarrior-android-smoke.log 2>&1 &
          server_pid="$!"
          echo "$server_pid" > /tmp/taskwarrior-android-smoke.pid
          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:38184/health; then
              exit 0
            fi
            sleep 0.25
          done
          cat /tmp/taskwarrior-android-smoke.log
          exit 1
      - name: Android Shell Parity Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_DEVICE: emulator-5554
          BACKEND_DEFINE: BACKEND_URL=http://10.0.2.2:38184
          TEST_TARGET: integration_test/shell_parity_test.dart
          BACKEND_TEST_TARGET: integration_test/web_backend_smoke_test.dart
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          working-directory: flutter_app
          script: |
            bash tool/run_android_backend_smoke.sh
      - name: Stop Android Rust Test Backend
        if: always()
        run: |
          if [ -f /tmp/taskwarrior-android-smoke.pid ]; then
            kill "$(cat /tmp/taskwarrior-android-smoke.pid)" || true
          fi
